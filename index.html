<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SantriPay — Sistem Pembayaran Santri</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,500;1,8..60,600&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ===========================================================
   DESIGN TOKENS — SantriPay
   Subject: pesantren bendahara counter + kwitansi pembayaran.
   Palette: pesantren hijau tua (amanah/kepercayaan) + emas
   (kilau kwitansi/uang), kertas krem seperti kwitansi lama.
   Type: serif untuk identitas dokumen resmi, sans untuk UI,
   mono untuk nominal/nomor kwitansi (angka harus presisi).
=========================================================== */
:root{
  --ink:        #17281c;
  --hijau-900:  #123524;
  --hijau-700:  #1f5c3f;
  --hijau-600:  #297a52;
  --hijau-500:  #3a9668;
  --hijau-100:  #e4f2ea;
  --hijau-50:   #f2f9f4;
  --paper:      #faf6ec;
  --paper-2:    #f2ecda;
  --line:       #ddd3b8;
  --gold-600:   #a6791f;
  --gold-500:   #c99a34;
  --gold-100:   #f8ecd0;
  --red-600:    #a83a32;
  --red-100:    #f7e1de;
  --white:      #ffffff;
  --font-ui: "Source Serif 4","Iowan Old Style","Source Serif Pro",ui-serif,Georgia,serif;
  --font-body: "Inter","Helvetica Neue",Arial,sans-serif;
  --font-mono: "IBM Plex Mono","SFMono-Regular",Consolas,monospace;
  --radius: 8px;
  --radius-lg: 14px;
  --ease: cubic-bezier(.25,.1,.25,1);
  --shadow-xs: 0 1px 2px rgba(23,40,28,.06);
  --shadow-sm: 0 1px 2px rgba(23,40,28,.05), 0 2px 6px rgba(23,40,28,.06);
  --shadow-md: 0 2px 6px rgba(23,40,28,.06), 0 12px 28px rgba(23,40,28,.10);
  --shadow-lg: 0 8px 16px rgba(23,40,28,.08), 0 24px 48px rgba(23,40,28,.16);
}

/* ===== TEMA GELAP ===== */
body.tema-gelap{
  --ink:#e6ede8; --hijau-900:#0b1a12; --hijau-700:#134a30; --hijau-600:#1c6b45;
  --hijau-500:#2f9464; --hijau-100:#173523; --hijau-50:#122a1b;
  --paper:#0e1712; --paper-2:#182a1f; --line:#2d4335;
  --gold-600:#d9a83b; --gold-500:#eec468; --gold-100:#2a2110;
  --red-600:#e0685c; --red-100:#301715; --white:#182a1f;
  --shadow-xs:0 1px 2px rgba(0,0,0,.3); --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow-md:0 4px 16px rgba(0,0,0,.5); --shadow-lg:0 12px 32px rgba(0,0,0,.6);
  background:#0e1712; color:#e6ede8;
}
body.tema-gelap .card,body.tema-gelap .kpi-card,body.tema-gelap .modal{background:#182a1f;border-color:#2d4335;}
body.tema-gelap input,body.tema-gelap select,body.tema-gelap textarea{background:#0e1712;color:#e6ede8;border-color:#2d4335;}
body.tema-gelap tbody tr:hover{background:#173523;}
body.tema-gelap .login-card{background:#182a1f;border-color:#2d4335;}
body.tema-gelap .login-form-wrap h2,body.tema-gelap .login-form-wrap .sub{color:#9fb3a6;}
body.tema-gelap .jp-tile{background:#182a1f;border-color:#2d4335;}
body.tema-gelap thead th,body.tema-gelap .kpi-card .label,body.tema-gelap .kpi-card .sub{color:#9fb3a6;}

/* ===== TEMA KLASIK (krem/putih) ===== */
body.tema-klasik{
  --ink:#241f12; --hijau-900:#2c2415; --hijau-700:#4a3c1f; --hijau-600:#6b5729;
  --hijau-500:#8a7238; --hijau-100:#f3ecd8; --hijau-50:#faf6ec;
  --paper:#fffdf7; --paper-2:#f6f0df; --line:#e6dcb9;
  --gold-600:#a6791f; --gold-500:#c99a34; --gold-100:#f8ecd0;
  --red-600:#a83a32; --red-100:#f7e1de; --white:#ffffff;
  background:#fffdf7; color:#241f12;
}
body.tema-klasik .sidebar{background:#2c2415;}
body.tema-klasik .card,body.tema-klasik .kpi-card{background:#fff;border-color:#e6dcb9;}

/* ===== TEMA BIRU LANGIT ===== */
body.tema-biru{
  --ink:#132433; --hijau-900:#0d2b40; --hijau-700:#155378; --hijau-600:#1c74a3;
  --hijau-500:#2c92c4; --hijau-100:#e2f0f7; --hijau-50:#f2f9fc;
  --paper:#f7fbfd; --paper-2:#e9f3f8; --line:#cfe2ec;
  --gold-600:#a6791f; --gold-500:#c99a34; --gold-100:#f8ecd0;
  --red-600:#a83a32; --red-100:#f7e1de; --white:#ffffff;
  --shadow-xs:0 1px 2px rgba(13,43,64,.08); --shadow-sm:0 1px 2px rgba(13,43,64,.1); --shadow-md:0 4px 16px rgba(13,43,64,.15); --shadow-lg:0 16px 40px rgba(13,43,64,.2);
  background:#f7fbfd; color:#132433;
}
body.tema-biru .sidebar{background:#0d2b40;}
body.tema-biru .card,body.tema-biru .kpi-card{background:#fff;border-color:#cfe2ec;}
body.tema-biru .nav-item.active{background:#c99a34;color:#0d2b40;}

/* ===== Pilih Tema ===== */
.tema-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;}
.tema-btn{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  border:2px solid var(--line);border-radius:10px;padding:10px 14px;
  background:var(--white);cursor:pointer;font-size:12px;font-weight:600;
  color:var(--ink);transition:border-color .15s,transform .1s;min-width:78px;
  font-family:var(--font-body);
}
.tema-btn:hover{transform:translateY(-2px);}
.tema-btn.active{border-color:var(--gold-600);box-shadow:0 0 0 3px var(--gold-100);}
.tema-swatch{width:34px;height:34px;border-radius:50%;border:2px solid rgba(0,0,0,.08);}

/* ===== BASE ===== */
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  transition:background .2s var(--ease),color .2s var(--ease);
}
h1,h2,h3,h4{font-family:var(--font-ui);margin:0;font-weight:600;}
button{font-family:var(--font-body);cursor:pointer;}
input,select,textarea{font-family:var(--font-body);}
.mono{font-family:var(--font-mono);}
a{color:inherit;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;}

/* ===== LOGIN ===== */
.login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(circle at 15% 15%, var(--hijau-100) 0%, transparent 45%),
    radial-gradient(circle at 85% 85%, var(--gold-100) 0%, transparent 45%),
    var(--paper);
  padding:24px;
}
.login-card{
  display:flex;max-width:820px;width:100%;background:var(--white);
  border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;
  box-shadow:var(--shadow-lg);
}
.login-brand{
  flex:1;background:linear-gradient(160deg,var(--hijau-900),var(--hijau-700));
  color:#f2f9f4;padding:40px 34px;display:flex;flex-direction:column;justify-content:space-between;
  position:relative;min-width:260px;
}
.login-brand::after{
  content:"";position:absolute;inset:0;opacity:.12;
  background-image:radial-gradient(circle, #fff 1px, transparent 1.4px);
  background-size:16px 16px;
}
.login-brand .mark{font-family:var(--font-ui);font-size:28px;font-weight:700;position:relative;z-index:1;}
.login-brand .mark span{color:var(--gold-500);}
.login-brand .tagline{font-family:var(--font-ui);font-size:19px;line-height:1.5;position:relative;z-index:1;font-style:italic;}
.login-brand .foot{font-size:12px;opacity:.75;position:relative;z-index:1;}
.login-form-wrap{flex:1;padding:40px 36px;min-width:280px;}
.login-form-wrap h2{font-size:24px;margin-bottom:4px;}
.login-form-wrap .sub{color:var(--hijau-600);font-size:13.5px;margin-bottom:26px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:6px;color:var(--hijau-700);}
.field input,.field select,.field textarea{
  width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:var(--radius);
  background:var(--paper);color:var(--ink);font-size:14px;transition:border-color .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--hijau-600);}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 18px;border-radius:var(--radius);border:1.5px solid transparent;
  font-weight:600;font-size:13.5px;transition:all .15s var(--ease);white-space:nowrap;
}
.btn-primary{background:var(--hijau-700);color:#fff;}
.btn-primary:hover{background:var(--hijau-600);}
.btn-gold{background:var(--gold-600);color:#fff;}
.btn-gold:hover{background:var(--gold-500);}
.btn-outline{background:transparent;border-color:var(--line);color:var(--ink);}
.btn-outline:hover{border-color:var(--hijau-600);color:var(--hijau-700);}
.btn-danger{background:transparent;border-color:var(--red-600);color:var(--red-600);}
.btn-danger:hover{background:var(--red-100);}
.btn-block{width:100%;}
.btn-sm{padding:6px 11px;font-size:12px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.login-err{background:var(--red-100);color:var(--red-600);padding:9px 12px;border-radius:var(--radius);font-size:12.5px;margin-bottom:14px;}
.login-hint{margin-top:16px;font-size:11.5px;color:var(--hijau-600);background:var(--hijau-50);padding:10px 12px;border-radius:var(--radius);}

/* ===== APP SHELL ===== */
.app-shell{display:flex;min-height:100vh;}
.sidebar{
  width:230px;background:var(--hijau-900);color:#eef6f0;flex-shrink:0;
  display:flex;flex-direction:column;padding:20px 14px;position:sticky;top:0;height:100vh;overflow-y:auto;
}
.sidebar .brand{font-family:var(--font-ui);font-size:19px;font-weight:700;padding:6px 10px 20px;}
.sidebar .brand span{color:var(--gold-500);}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;
  background:transparent;border:none;color:#cfe2d5;font-size:13.5px;font-weight:600;
  text-align:left;width:100%;margin-bottom:3px;transition:background .12s;
}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-item.active{background:var(--gold-600);color:#1c2b1f;}
.nav-icon{font-size:16px;width:20px;text-align:center;}
.sidebar-foot{margin-top:auto;padding-top:16px;border-top:1px solid rgba(255,255,255,.12);font-size:12px;color:#a9c2b0;}
.sidebar-foot .user-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sidebar-foot .avatar{width:30px;height:30px;border-radius:50%;background:var(--gold-600);color:#1c2b1f;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  padding:16px 28px;border-bottom:1px solid var(--line);display:flex;align-items:center;
  justify-content:space-between;background:var(--white);position:sticky;top:0;z-index:5;
}
.topbar h1{font-size:20px;}
.topbar .sub{font-size:12.5px;color:var(--hijau-600);margin-top:2px;}
.content{padding:24px 28px;flex:1;}

/* ===== KPI / CARD ===== */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:22px;}
.kpi-card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius-lg);padding:16px 18px;box-shadow:var(--shadow-sm);}
.kpi-card .label{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--hijau-600);font-weight:700;margin-bottom:6px;}
.kpi-card .value{font-family:var(--font-mono);font-size:24px;font-weight:700;}
.kpi-card .sub{font-size:11.5px;color:#8a9690;margin-top:4px;}
.card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);margin-bottom:20px;}
.card-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.card-head h3{font-size:16px;}
.card-body{padding:18px 20px;}

/* ===== TABLE ===== */
table{width:100%;border-collapse:collapse;font-size:13.5px;}
thead th{text-align:left;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--hijau-600);border-bottom:1.5px solid var(--line);white-space:nowrap;}
tbody td{padding:10px 14px;border-bottom:1px solid var(--line);vertical-align:middle;}
tbody tr:hover{background:var(--hijau-50);}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-hijau{background:var(--hijau-100);color:var(--hijau-700);}
.badge-gold{background:var(--gold-100);color:var(--gold-600);}
.badge-red{background:var(--red-100);color:var(--red-600);}
.table-empty{padding:30px;text-align:center;color:#8a9690;font-size:13.5px;}
.actions-cell{display:flex;gap:6px;}
.icon-btn{background:transparent;border:1px solid var(--line);border-radius:6px;padding:5px 8px;font-size:12.5px;}
.icon-btn:hover{border-color:var(--hijau-600);}
.searchbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.searchbar input,.searchbar select{padding:8px 11px;border:1.5px solid var(--line);border-radius:var(--radius);font-size:13px;background:var(--paper);color:var(--ink);}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(18,30,20,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
.modal{background:var(--white);border-radius:var(--radius-lg);max-width:560px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.modal-head h3{font-size:17px;}
.modal-close{background:transparent;border:none;font-size:20px;color:#8a9690;line-height:1;}
.modal-body{padding:20px 22px;}
.modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:520px){.form-row{grid-template-columns:1fr;}}

/* ===== TOAST ===== */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:80;display:flex;flex-direction:column;gap:8px;}
.toast{padding:11px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;box-shadow:var(--shadow-md);animation:slideIn .2s var(--ease);}
.toast-ok{background:var(--hijau-700);color:#fff;}
.toast-err{background:var(--red-600);color:#fff;}
@keyframes slideIn{from{transform:translateY(10px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* ===== KASIR ===== */
.kasir-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:18px;align-items:start;}
@media(max-width:980px){.kasir-grid{grid-template-columns:1fr;}}
.jp-tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}
.jp-tile{background:var(--white);border:1.5px solid var(--line);border-radius:var(--radius);padding:14px;cursor:pointer;transition:border-color .12s,transform .1s;}
.jp-tile:hover{border-color:var(--hijau-600);transform:translateY(-1px);}
.jp-tile .nm{font-weight:700;font-size:13.5px;margin-bottom:4px;}
.jp-tile .kat{font-size:11px;color:var(--hijau-600);margin-bottom:8px;}
.jp-tile .harga{font-family:var(--font-mono);font-weight:700;color:var(--gold-600);font-size:14.5px;}
.cart-box{background:var(--white);border:1px solid var(--line);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);position:sticky;top:88px;}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px dashed var(--line);gap:8px;}
.cart-item .nm{font-size:13px;font-weight:600;}
.cart-item .qty-ctl{display:flex;align-items:center;gap:6px;}
.qty-ctl button{width:22px;height:22px;border-radius:5px;border:1px solid var(--line);background:var(--paper);font-weight:700;}
.cart-total{display:flex;justify-content:space-between;font-family:var(--font-mono);font-weight:700;font-size:17px;padding-top:12px;border-top:2px solid var(--ink);}

/* ===== NOTA / KWITANSI ===== */
.nota{width:360px;padding:0;font-family:var(--font-mono);font-size:12px;background:#fff;color:#161616;position:relative;border:1px solid #e2e2e2;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.nota .nota-head{background:linear-gradient(160deg,var(--hijau-900),var(--hijau-700));color:#f2f9f4;padding:20px 24px 16px;text-align:center;}
.nota .nota-logo{width:38px;height:38px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,.14);overflow:hidden;}
.nota .nota-logo img{width:100%;height:100%;object-fit:contain;}
.nota .nota-logo svg{width:20px;height:20px;}
.nota h2{font-family:var(--font-ui);font-size:15.5px;font-weight:700;letter-spacing:.01em;margin-bottom:3px;text-transform:uppercase;}
.nota .nota-sub{font-size:10.5px;opacity:.85;line-height:1.5;font-family:var(--font-body);}
.nota .nota-body{padding:20px 24px 22px;}
.nota .nota-eyebrow{font-family:var(--font-body);font-size:9.5px;font-weight:700;letter-spacing:.09em;color:var(--hijau-600);text-transform:uppercase;text-align:center;margin-bottom:10px;}
.nota .center{text-align:center;}
.nota hr{border:none;border-top:1px dashed #cfcfcf;margin:12px 0;}
.nota hr.solid{border-top:1.5px solid #1a1a1a;}
.nota .row{display:flex;justify-content:space-between;gap:10px;margin-bottom:5px;line-height:1.5;}
.nota .row span:first-child{color:#6b6b6b;flex-shrink:0;}
.nota .row span:last-child{text-align:right;font-weight:600;}
.nota .noNota-highlight{background:var(--hijau-50);border:1px dashed var(--hijau-500);border-radius:7px;padding:9px 12px;text-align:center;margin-bottom:14px;}
.nota .noNota-highlight .lbl{font-family:var(--font-body);font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--hijau-600);text-transform:uppercase;margin-bottom:3px;}
.nota .noNota-highlight .val{font-family:var(--font-mono);font-size:15px;font-weight:700;color:var(--hijau-700);letter-spacing:.02em;}
.nota .item-row{margin-bottom:8px;}
.nota .item-row .row span:first-child{color:#161616;font-weight:600;}
.nota .item-sub{font-family:var(--font-body);font-size:10px;color:#8a9690;margin-top:1px;}
.nota .total-row{display:flex;justify-content:space-between;align-items:baseline;font-weight:700;font-size:16px;padding:10px 0 2px;}
.nota .total-row span:first-child{font-family:var(--font-body);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#444;font-weight:700;}
.nota .total-row span:last-child{color:var(--hijau-700);}
.nota .nota-foot{font-family:var(--font-body);text-align:center;margin-top:14px;color:#444;}
.nota .nota-foot .thanks{font-weight:700;font-size:11.5px;color:var(--hijau-700);margin-bottom:2px;}
.nota .nota-foot .doa{font-size:10.5px;font-style:italic;color:#7d8a83;}
.nota .nota-printed{font-family:var(--font-body);font-size:8.5px;color:#b0b0b0;text-align:center;margin-top:12px;}
.stamp{
  position:absolute;top:44%;left:50%;transform:translate(-50%,-50%) rotate(-18deg);
  border:3px solid var(--red-600);color:var(--red-600);border-radius:10px;
  padding:6px 18px;font-family:var(--font-ui);font-weight:700;font-size:22px;
  opacity:.5;letter-spacing:.06em;z-index:1;pointer-events:none;
}

/* ===== SETTINGS ===== */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:900px){.settings-grid{grid-template-columns:1fr;}}

/* ===== UTIL ===== */
.flex{display:flex;}
.gap8{gap:8px;}
.mb0{margin-bottom:0;}

<script>
/* =========================================================
   SANTRIPAY — state, util, penyimpanan (localStorage)
========================================================= */
const LS_PREFIX = 'santripay_';
function dbGet(key, fallback){
  try{ const v = localStorage.getItem(LS_PREFIX+key); return v ? JSON.parse(v) : fallback; }
  catch(e){ return fallback; }
}
function dbSet(key, val){
  try{ localStorage.setItem(LS_PREFIX+key, JSON.stringify(val)); return true; }
  catch(e){ toast('Gagal menyimpan data: '+e.message,'err'); return false; }
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function formatRupiah(n){
  n = Number(n)||0;
  return 'Rp' + n.toLocaleString('id-ID');
}
function formatTanggal(iso, withTime){
  const d = new Date(iso);
  const opt = {day:'2-digit',month:'short',year:'numeric'};
  if(withTime){ opt.hour='2-digit'; opt.minute='2-digit'; }
  return d.toLocaleDateString('id-ID', opt);
}
function todayISO(){ return new Date().toISOString(); }
function localDateStr(d){
  const x = d ? new Date(d) : new Date();
  const y = x.getFullYear(), m = String(x.getMonth()+1).padStart(2,'0'), dd = String(x.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
// Menghasilkan nomor struk profesional berformat SP-TTBBTTTT-XXXX
// (SP-tanggal.bulan.tahun-nomor urut transaksi pada tanggal tsb).
// Contoh: transaksi ke-3 pada 8 Juli 2026 -> SP-08072026-0003
function generateNoNota(tanggalISO){
  const d = new Date(tanggalISO || new Date());
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear();
  const hariIni = localDateStr(d);
  const urutHariIni = state.transaksi.filter(t => localDateStr(t.tanggal) === hariIni).length + 1;
  return `SP-${dd}${mm}${yyyy}-${String(urutHariIni).padStart(4,'0')}`;
}
function startOfDay(d){ const x=new Date(d); x.setHours(0,0,0,0); return x; }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast toast-'+(type==='err'?'err':'ok');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>el.remove(), 3200);
}

    state.santri = [
      {id:uid(), nis:'2024001', nama:'Ahmad Fauzan', kelas:'VII', asrama:'Al-Furqan', jenisKelamin:'L', waliNama:'Budi Santoso', waliHp:'6281234567890', alamat:'Indramayu', status:'Aktif', kategoriSantri:'Umum'},

    ];
    dbSet('santri', state.santri);

  if(state.guru.length===0){
    state.guru = [

      {id:uid(), nama:'Ustadzah Fatimah Zahra', jabatan:'Wali Kelas VIII / Bahasa Arab', hp:'6281234500002', gajiPokok:1500000},

function loadAll(){
  state.users = dbGet('users', []);
  state.santri = dbGet('santri', []);
  state.guru = dbGet('guru', []);
  state.jenisPembayaran = dbGet('jenisPembayaran', []);
  state.transaksi = dbGet('transaksi', []);
  state.pengeluaran = dbGet('pengeluaran', []);
  state.settings = {...state.settings, ...dbGet('settings', {})};
  state.gdrive = dbGet('gdrive', state.gdrive);
  seedIfEmpty();
  applyTema(state.settings.tema||'default');
}

function applyTema(tema){
  document.body.classList.remove('tema-gelap','tema-klasik','tema-biru');
  if(tema && tema!=='default') document.body.classList.add('tema-'+tema);
}

function boot(){
  loadAll();
  const savedAuthId = sessionStorage.getItem(LS_PREFIX+'authId');
  if(savedAuthId){
    const u = state.users.find(x=>x.id===savedAuthId);
    if(u) state.auth = u;
  }
  if(state.gdrive && state.gdrive.connected) gdriveStartAutoBackup();
  maybeShowDeviceModal();
  render();
}

function maybeShowDeviceModal(){
  if(state.auth && !state.gdrive.connected && !localStorage.getItem(LS_PREFIX+'deviceSeen')){
    state.uiFlags.deviceModalOpen = true;
  }
}

/* =========================================================
   RENDER — root
========================================================= */
function render(){
  document.title = `${state.settings.appNamePrefix||'Santri'}${state.settings.appNameAccent||'Pay'} — Sistem Pembayaran Santri`;
  const app = document.getElementById('app');
  if(!state.auth){ app.innerHTML = renderLogin(); attachLoginEvents(); return; }
  const allowedRoutes = NAV.filter(n=> !n.adminOnly || state.auth.role==='admin').map(n=>n.key);
  if(!allowedRoutes.includes(state.route)) state.route = 'dashboard';
  app.innerHTML = renderShell();
  attachShellEvents();
}

function renderBrandMark(imgMaxHeight){
  if(state.settings.logoDataUrl){
    return `<img src="${state.settings.logoDataUrl}" alt="Logo" style="display:block;max-height:${imgMaxHeight}px;max-width:100%;object-fit:contain;">`;
  }
  return `${esc(state.settings.appNamePrefix||'Santri')}<span>${esc(state.settings.appNameAccent||'Pay')}</span>`;
}

function renderLogin(){
  return `
  <div class="login-screen">
    <div class="login-card">
      <div class="login-brand">
        <div class="mark">${renderBrandMark(34)}</div>
        <div class="tagline">${esc(state.settings.appTagline||'')}</div>
        <div class="foot">${esc(state.settings.namaLembaga)}</div>
      </div>
      <div class="login-form-wrap">
        <h2>Masuk</h2>
        <div class="sub">Sistem Pengelolaan Pembayaran Santri</div>
        <div id="loginErrBox"></div>
        <div class="field"><label>Username</label><input id="loginUser" type="text" placeholder="username" autocomplete="username"></div>
        <div class="field"><label>Kata Sandi</label><input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
        <button class="btn btn-primary btn-block" id="btnLogin">Masuk</button>
      </div>
    </div>
  </div>`;
}

function attachLoginEvents(){
  const doLogin = ()=>{
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value;
    const found = state.users.find(x=>x.username===u && x.password===p);
    const errBox = document.getElementById('loginErrBox');
    if(!found){ errBox.innerHTML = '<div class="login-err">Username atau kata sandi salah.</div>'; return; }
    state.auth = found;
    sessionStorage.setItem(LS_PREFIX+'authId', found.id);
    state.route = 'dashboard';
    toast('Selamat datang, '+found.nama+'.', 'ok');
    maybeShowDeviceModal();
    render();
  };
  document.getElementById('btnLogin').addEventListener('click', doLogin);
  document.getElementById('loginPass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  document.getElementById('loginUser').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
}

function renderShell(){
  const nav = NAV.filter(n=> !n.adminOnly || state.auth.role==='admin');
  const [title, sub] = ROUTE_TITLE[state.route] || ['','',''];
  const initials = (state.auth.nama||'?').split(' ').map(s=>s[0]).join('').slice(0,2).toUpperCase();
  return `
  <div class="app-shell">
    <div class="sidebar">
      <div class="brand">${renderBrandMark(26)}</div>
      ${nav.map(i=>`<button class="nav-item ${state.route===i.key?'active':''}" data-route="${i.key}"><span class="nav-icon">${i.icon}</span>${i.label}</button>`).join('')}
      <div class="sidebar-foot">
        <div class="user-row">
          <div class="avatar">${initials}</div>
          <div>
            <div style="font-weight:700;color:#fff;font-size:13px;">${esc(state.auth.nama)}</div>
            <div style="font-size:11px;text-transform:capitalize;">${esc(state.auth.role)}</div>
          </div>
        </div>
        <button class="btn btn-outline btn-sm btn-block" id="btnLogout" style="border-color:rgba(255,255,255,.25);color:#eef6f0;">Keluar</button>
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <div><h1>${title}</h1><div class="sub">${sub}</div></div>
        <div class="tag-muted mono">${formatTanggal(todayISO(), true)}</div>
      </div>
      <div class="content">${renderRoute()}</div>
    </div>
  </div>
  ${state.uiFlags.modal ? renderModal() : ''}
  ${state.uiFlags.receiptModalTrx ? renderReceiptModal(state.uiFlags.receiptModalTrx) : ''}
  ${state.uiFlags.kartuModal ? renderKartuModal() : ''}
  ${state.uiFlags.bulanModal ? renderBulanModal() : ''}
  ${state.uiFlags.deviceModalOpen ? renderDeviceModal() : ''}`;
}

========================================================= */
function renderDeviceModal(){
  const appName = `${esc(state.settings.appNamePrefix||'Santri')}${esc(state.settings.appNameAccent||'Pay')}`;
  return `
  <div class="modal-overlay" id="deviceModalOverlay">
    <div class="modal" style="max-width:560px;">
      <div class="modal-head"><h3>&#128075; Perangkat Baru Terdeteksi</h3><button class="modal-close" id="deviceModalClose">&times;</button></div>
      <div class="modal-body">
        <div class="device-info-box">
          Ini kali pertama <b>${appName}</b> dibuka di perangkat ini. Supaya data (santri, jenis pembayaran, transaksi, pengguna, pengaturan) tetap sinkron dan aman, sambungkan <b>Google Drive</b> sekarang. Jika perangkat lain sudah pernah menyambungkan Drive sebelumnya, gunakan <b>Ambil Data dari Drive</b> setelah tersambung agar data terbaru langsung termuat di perangkat ini.

/* =========================================================
   BUKU SANTRI — buku pembayaran tahun ajaran per santri
   Digabung dalam SATU buku (tidak terpisah per jenis pembayaran):
     SEMESTER 1 (Ganjil) : Juli - Desember  -> storan bulanan + Ujian Semester 1, Infak Kegiatan, Media Belajar
     SEMESTER 2 (Genap)  : Januari - Juni   -> storan bulanan + Ujian Semester 2, Haul Akbar, Media Belajar, Milad Majelis, Ujian & Akhirussanah
   (dipakai konsisten untuk cetak, laporan keuangan, & kirim WA)
========================================================= */
const BULAN_NAMA = ['JANUARI','FEBRUARI','MARET','APRIL','MEI','JUNI','JULI','AGUSTUS','SEPTEMBER','OKTOBER','NOVEMBER','DESEMBER'];
/* Urutan bulan per semester tahun ajaran: Semester 1 = Jul..Des, Semester 2 = Jan..Jun */
const SEMESTER1_IDX = [6,7,8,9,10,11];
const SEMESTER2_IDX = [0,1,2,3,4,5];

function initialsOf(name){
  return (name||'-').trim().split(/\s+/).map(s=>s[0]).join('').slice(0,3).toUpperCase();
}

/* Dipakai saat kasir memilih bulan spesifik untuk SATU jenis pembayaran Bulanan di keranjang. */
function bulanStorData(santriId, jenisId, year){
  return BULAN_NAMA.map((nm, idx)=>{
    let stor = 0, tglTerakhir = null, kasirTerakhir = null;
    state.transaksi.filter(t=>t.santriId===santriId).forEach(t=>{
      const d = new Date(t.tanggal);
      t.items.filter(i=>i.jenisId===jenisId).forEach(i=>{
        let cocok = false;
        if(Array.isArray(i.bulanTerpilih) && i.bulanTerpilih.length){
          // Data baru: item menyimpan daftar bulan spesifik yang dibayar (bisa lintas bulan/tahun).
          if(i.bulanTerpilih.some(b=>b.year===year && b.idx===idx)){ cocok = true; stor += i.nominal; }
        } else {
          // Data lama (sebelum fitur daftar bulan): asumsikan bulan pembayaran = bulan transaksi.
          if(d.getFullYear()===year && d.getMonth()===idx){ cocok = true; stor += i.subtotal; }
        }
        if(cocok && (!tglTerakhir || d>tglTerakhir)){ tglTerakhir = d; kasirTerakhir = t.kasirNama || null; }
      });
    });
    return { no: idx+1, nama: nm, stor, tgl: tglTerakhir, kasir: kasirTerakhir };
  });
}

/* Daftar nama bulan singkat untuk label keranjang & badge, mis. "Jul 2026". */
const BULAN_SINGKAT = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
function labelBulanTerpilih(bulanTerpilih){
  if(!Array.isArray(bulanTerpilih) || !bulanTerpilih.length) return '';
  const sorted = [...bulanTerpilih].sort((a,b)=> a.year-b.year || a.idx-b.idx);
  return sorted.map(b=>`${BULAN_SINGKAT[b.idx]} ${b.year}`).join(', ');
}

/* Tahun ajaran berjalan (awal), mis. jika sekarang Sept 2026 -> 2026 (TA 2026/2027);
   jika sekarang Maret 2027 -> 2026 (masih TA 2026/2027, semester genap). */
function tahunAjaranBerjalan(){
  const now = new Date();
  return now.getMonth() >= 6 ? now.getFullYear() : now.getFullYear()-1;
}

/* Semester berjalan saat ini: Ganjil = Juli..Desember, Genap = Januari..Juni. */
function semesterBerjalan(){
  const now = new Date();
  return now.getMonth() >= 6 ? 'Ganjil' : 'Genap';
}

/* Total storan bulanan (SEMUA jenis pembayaran periode Bulanan digabung jadi satu baris per bulan). */
function bukuSantriBulanRow(santriId, year, idx, namaBulan){
  let stor = 0, tglTerakhir = null, kasirTerakhir = null;
  state.transaksi.filter(t=>t.santriId===santriId).forEach(t=>{
    const d = new Date(t.tanggal);
    t.items.forEach(i=>{
      const jp = state.jenisPembayaran.find(j=>j.id===i.jenisId);
      if(!jp || jp.periode!=='Bulanan') return;
      let cocok = false;
      if(Array.isArray(i.bulanTerpilih) && i.bulanTerpilih.length){
        if(i.bulanTerpilih.some(b=>b.year===year && b.idx===idx)){ cocok = true; stor += i.nominal; }
      } else {
        if(d.getFullYear()===year && d.getMonth()===idx){ cocok = true; stor += i.subtotal; }
      }
      if(cocok && (!tglTerakhir || d>tglTerakhir)){ tglTerakhir = d; kasirTerakhir = t.kasirNama || null; }
    });
  });
  return { nama: namaBulan, stor, tgl: tglTerakhir, kasir: kasirTerakhir };
}

/* Total pembayaran satu jenis kegiatan semester, dicocokkan berdasarkan tahun ajaran + semester transaksi. */
function bukuSantriKegiatanRow(santriId, taAwal, semesterKey, jp){
  let stor = 0, tglTerakhir = null, kasirTerakhir = null;
  state.transaksi.filter(t=>t.santriId===santriId).forEach(t=>{
    const d = new Date(t.tanggal);
    const masukSemester = semesterKey==='Ganjil'
      ? (d.getFullYear()===taAwal && d.getMonth()>=6)
      : (d.getFullYear()===taAwal+1 && d.getMonth()<=5);
    if(!masukSemester) return;
    t.items.filter(i=>i.jenisId===jp.id).forEach(i=>{
      stor += i.subtotal;
      if(!tglTerakhir || d>tglTerakhir){ tglTerakhir = d; kasirTerakhir = t.kasirNama || null; }
    });
  });
  return { nama: jp.nama, stor, tgl: tglTerakhir, kasir: kasirTerakhir };
}

/* Menyusun buku santri untuk SATU semester saja (terpisah, bukan digabung jadi satu buku utuh).
   SPP Bulanan otomatis masuk ke semester yang sesuai berdasarkan bulan yang sudah ditentukan:
   Semester 1 (Ganjil) = Juli..Desember, Semester 2 (Genap) = Januari..Juni. */
function buildBukuSantriData(santriId, taAwal, semesterKey){
  semesterKey = (semesterKey==='Genap') ? 'Genap' : 'Ganjil';
  const monthYear = semesterKey==='Ganjil' ? taAwal : taAwal+1;
  const monthIdx = semesterKey==='Ganjil' ? SEMESTER1_IDX : SEMESTER2_IDX;
  const rows = [
    ...monthIdx.map(idx=>bukuSantriBulanRow(santriId, monthYear, idx, BULAN_NAMA[idx])),
    ...state.jenisPembayaran.filter(j=>j.periode==='Kegiatan' && j.semester===semesterKey)
      .map(jp=>bukuSantriKegiatanRow(santriId, taAwal, semesterKey, jp)),
  ].map((r,i)=>({...r, no:i+1}));
  return {
    taAwal, semesterKey,
    label: semesterKey==='Ganjil' ? 'SEMESTER 1 (GANJIL)' : 'SEMESTER 2 (GENAP)',
    sub: semesterKey==='Ganjil' ? `Juli s.d Desember ${taAwal}` : `Januari s.d Juni ${taAwal+1}`,
    rows,
  };
}

function buildBukuSantriPDF(santriId, taAwal, semesterKey){
  if(!window.jspdf || !window.jspdf.jsPDF){ throw new Error('Pustaka PDF belum termuat, coba lagi sesaat lagi.'); }
  const s = state.santri.find(x=>x.id===santriId);
  const data = buildBukuSantriData(santriId, taAwal, semesterKey);
  const { jsPDF } = window.jspdf;
  const W = 148, M = 10, CX = W/2; // A5 lebar (portrait, mm)
  const doc = new jsPDF({ unit:'mm', format:'a5' });
  let y = 12;
  const center = (t,size,bold)=>{ doc.setFont('helvetica', bold?'bold':'normal'); doc.setFontSize(size); doc.text(String(t), CX, y, {align:'center'}); y+=size/2.2+1; };
  center(`BUKU SANTRI — TAHUN AJARAN ${taAwal}/${taAwal+1}`, 9.5, true);
  center((state.settings.namaLembaga||'').toUpperCase(), 11, true);
  if(state.settings.alamat) center('Alamat : '+state.settings.alamat, 7.5, false);
  y+=1; doc.setDrawColor(20); doc.setLineWidth(0.4); doc.line(M,y,W-M,y); y+=5;

  doc.setFontSize(8.6); doc.setFont('helvetica','normal');
  const info = [['NAMA SANTRI', s?s.nama:'-'], ['NAMA WALI', s?s.waliNama:'-'], ['ALAMAT', s?s.alamat:'-'], ['HP', s?s.waliHp:'-']];
  info.forEach(([l,v])=>{ doc.setFont('helvetica','bold'); doc.text(l, M, y); doc.setFont('helvetica','normal'); doc.text(': '+v, M+24, y); y+=4.6; });
  y+=2;

  const colX = [M, M+10, M+38, M+66, M+88, W-M];
  const rowH = 5.4;
  const truncName = (nm)=> nm.length>22 ? nm.slice(0,21)+'…' : nm;
  const drawRow = (cells, bold, headerBg)=>{
    if(headerBg){ doc.setFillColor(238,238,238); doc.rect(M, y, W-2*M, rowH, 'F'); }
    doc.setDrawColor(20); doc.setLineWidth(0.2);
    doc.rect(M, y, W-2*M, rowH);
    for(let i=1;i<colX.length-1;i++){ doc.line(colX[i], y, colX[i], y+rowH); }
    doc.setFont('helvetica', bold?'bold':'normal'); doc.setFontSize(bold?7.6:7);
    cells.forEach((c,i)=>{
      const align = (i===1||i===2) ? 'left' : 'center';
      const tx = align==='left' ? colX[i]+2 : (colX[i]+colX[i+1])/2;
      doc.text(String(c), tx, y+rowH/2+1.2, {align});
    });
    y += rowH;
  };
  const drawSectionHead = (label)=>{
    doc.setFillColor(228,228,228); doc.rect(M, y, W-2*M, rowH, 'F');
    doc.setDrawColor(20); doc.setLineWidth(0.2); doc.rect(M, y, W-2*M, rowH);
    doc.setFont('helvetica','bold'); doc.setFontSize(7.2);
    doc.text(label, M+2, y+rowH/2+1.2);
    y += rowH;
  };
  drawRow(['NO','URAIAN','STOR','TGL','PARAF'], true, true);
  drawSectionHead(`${data.label} — ${data.sub}`);
  data.rows.forEach(m=>{
    drawRow([m.no, m.nama, m.stor?formatRupiah(m.stor):'Rp.', m.tgl?formatTanggal(m.tgl.toISOString()):'', m.kasir?truncName(m.kasir)+'*':''], false, false);
  });
  y+=5;
  doc.setFont('helvetica','italic'); doc.setFontSize(7);
  doc.text('Nb: *terakhir stor sebelum minggu wage', M, y);
  y+=3.8;
  const eparafNote = doc.splitTextToSize('*PARAF menampilkan nama petugas penerima (e-paraf / paraf elektronik), tercatat otomatis oleh sistem sesuai kasir yang memproses pembayaran.', W-2*M);
  doc.text(eparafNote, M, y);
  y += eparafNote.length*3.4 + 5;
  doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
  doc.text('TTD', W-M, y, {align:'right'});
  return doc;
}

          ? `<div class="tag-muted" style="font-size:12.5px;font-weight:600;">${semesterLabel}</div>`
          : `<div class="bulan-year-switch">
          <button id="bulanYearPrev">&larr;</button>
          <span class="yr mono">${bm.year}</span>
          <button id="bulanYearNext">&rarr;</button>
        </div>`}
        <div class="bulan-grid">
          ${idxList.map(idx=>{
            const m = bulanData[idx];
            const lunas = m.stor > 0;
            const dipilih = bm.selected.some(b=>b.year===bm.year && b.idx===idx);
            const cls = lunas ? 'lunas' : (dipilih ? 'selected' : '');
            return `
            <div class="bulan-tile ${cls}" ${lunas?'':`data-bulan-toggle="${idx}"`} title="${lunas?'Sudah lunas bulan ini':(dipilih?'Klik untuk batalkan pilihan':'Klik untuk pilih bulan ini')}">
              <div class="bm-nm">${BULAN_SINGKAT[idx]} ${bm.year}</div>
              <div class="bm-harga">${lunas ? 'Lunas &#10003;' : (dipilih ? 'Dipilih' : formatRupiah(jp?jp.nominal:0))}</div>
            </div>`;
          }).join('')}
        </div>
        <div class="bulan-summary">
          <div class="bs-label">${jumlahDipilih} bulan dipilih</div>
          <div>${formatRupiah(totalDipilih)}</div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-outline" id="bulanModalBatal">Batal</button>
        <button class="btn btn-gold" id="bulanModalTambah" ${jumlahDipilih===0?'disabled':''}>Tambahkan ke Keranjang</button>
      </div>
    </div>
  </div>`;
}

function renderRoute(){
  switch(state.route){
    case 'dashboard': return renderDashboard();
    case 'kasir': return renderKasir();
    case 'santri': return renderSantri();
    case 'guru': return renderGuru();
    case 'jenisPembayaran': return renderJenisPembayaran();
    case 'riwayat': return renderRiwayat();
    case 'laporan': return renderLaporan();
    case 'pengguna': return renderPengguna();
    case 'pengaturan': return renderPengaturan();
    default: return '';
  }
}

/* =========================================================
   DASHBOARD
========================================================= */
function renderDashboard(){
  const now = new Date();
  const todayStart = startOfDay(now);
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const trxToday = state.transaksi.filter(t=> new Date(t.tanggal) >= todayStart);
  const trxMonth = state.transaksi.filter(t=> new Date(t.tanggal) >= monthStart);
  const totalToday = trxToday.reduce((s,t)=>s+t.total,0);
  const totalMonth = trxMonth.reduce((s,t)=>s+t.total,0);
  const santriAktif = state.santri.filter(s=>s.status==='Aktif').length;

  const rekapJenis = {};
  trxMonth.forEach(t=> t.items.forEach(it=>{
    rekapJenis[it.nama] = (rekapJenis[it.nama]||0) + it.subtotal;
  }));
  const topJenis = Object.entries(rekapJenis).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxJenis = topJenis.length ? topJenis[0][1] : 1;

  const recent = [...state.transaksi].sort((a,b)=> new Date(b.tanggal)-new Date(a.tanggal)).slice(0,6);

  const isAdmin = state.auth.role === 'admin';
  const gdriveBanner = `
  <div class="card" style="margin-bottom:18px;">
    <div class="card-body" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
      <div>
        <div style="font-weight:700;">&#128279; Sinkronisasi Google Drive</div>
        <div class="tag-muted" style="font-size:12.5px;margin-top:2px;">
          ${state.gdrive.connected
            ? `Tersambung${state.gdrive.lastDownloadAt || state.gdrive.lastUploadAt ? ' &bull; Sinkron terakhir: '+formatTanggal(state.gdrive.lastUploadAt && (!state.gdrive.lastDownloadAt || state.gdrive.lastUploadAt > state.gdrive.lastDownloadAt) ? state.gdrive.lastUploadAt : state.gdrive.lastDownloadAt, true) : ' &bull; Belum pernah sinkron'} &mdash; Klik Update untuk memuat data terbaru dari Drive.`
            : (isAdmin ? 'Belum tersambung. Atur di menu Pengaturan &rarr; Sinkronisasi Google Drive.' : 'Belum tersambung. Hubungi Admin untuk menyambungkan Google Drive di menu Pengaturan.')}
        </div>
      </div>
      <button class="btn btn-gold btn-sm" id="btnUpdateFromDrive" ${!state.gdrive.connected?'disabled title="Google Drive belum tersambung"':''}>&#8681; Update</button>
    </div>
  </div>`;

  return gdriveBanner + `
  <div class="kpi-grid">
    <div class="kpi-card"><div class="label">Santri Aktif</div><div class="value">${santriAktif}</div><div class="sub">dari ${state.santri.length} total santri terdaftar</div></div>
    <div class="kpi-card"><div class="label">Pembayaran Hari Ini</div><div class="value">${formatRupiah(totalToday)}</div><div class="sub">${trxToday.length} transaksi</div></div>
    <div class="kpi-card"><div class="label">Pembayaran Bulan Ini</div><div class="value">${formatRupiah(totalMonth)}</div><div class="sub">${trxMonth.length} transaksi</div></div>
    <div class="kpi-card"><div class="label">Jenis Pembayaran</div><div class="value">${state.jenisPembayaran.length}</div><div class="sub">jenis tagihan aktif</div></div>
  </div>
  <div class="kasir-grid">
    <div class="card">
      <div class="card-head"><h3>Transaksi Terbaru</h3><button class="btn btn-outline btn-sm" data-route="riwayat">Lihat semua</button></div>
      <div class="card-body" style="padding:0;">
        <table>
          <thead><tr><th>Tanggal</th><th>Santri</th><th>Total</th><th>Metode</th></tr></thead>
          <tbody>
          ${recent.length? recent.map(t=>{
            const s = state.santri.find(x=>x.id===t.santriId);
            return `<tr><td>${formatTanggal(t.tanggal)}</td><td>${esc(s?s.nama:'-')}</td><td class="mono">${formatRupiah(t.total)}</td><td><span class="badge badge-hijau">${esc(t.metode)}</span></td></tr>`;
          }).join('') : `<tr><td colspan="4" class="table-empty">Belum ada transaksi pembayaran.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><h3>Rekap Jenis Pembayaran (Bulan Ini)</h3></div>
      <div class="card-body">
        ${topJenis.length ? topJenis.map(([nm,val])=>`
          <div style="margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px;">
              <span>${esc(nm)}</span><span class="mono" style="font-weight:700;">${formatRupiah(val)}</span>
            </div>
            <div style="background:var(--paper-2);border-radius:6px;height:8px;overflow:hidden;">
              <div style="background:var(--gold-600);height:100%;width:${Math.max(4,Math.round(val/maxJenis*100))}%;"></div>
            </div>
          </div>`).join('') : '<div class="table-empty">Belum ada data.</div>'}
      </div>
    </div>
  </div>`;
}

function periodRange(period){
  const now = new Date();
  let start;
  if(period==='hari') start = startOfDay(now);
  else if(period==='minggu'){ start = startOfDay(now); start.setDate(start.getDate()-6); }
  else if(period==='bulan') start = new Date(now.getFullYear(), now.getMonth(), 1);
  else if(period==='tahun') start = new Date(now.getFullYear(), 0, 1);
  else start = new Date(2000,0,1);
  return {start, end: now};
}

/* =========================================================
   LAPORAN KEUANGAN (EXCEL) — LEGER PEMBAYARAN PER SANTRI
   Sheet 1: rekap matrix seluruh santri x jenis pembayaran
   Sheet 2..n: leger (kartu riwayat pembayaran) tiap santri
========================================================= */
function sanitizeSheetName(name){
  // Nama sheet Excel maksimal 31 karakter & tidak boleh mengandung : \ / ? * [ ]
  return String(name||'Santri').replace(/[:\\\/\?\*\[\]]/g,'-').slice(0,31) || 'Santri';
}

function uniqueSheetName(base, used){
  let name = sanitizeSheetName(base);
  if(!used.has(name)){ used.add(name); return name; }
  let i = 2;
  while(true){
    const suffix = '_'+i;
    const candidate = sanitizeSheetName(name.slice(0, 31-suffix.length) + suffix);
    if(!used.has(candidate)){ used.add(candidate); return candidate; }
    i++;
  }
}

function downloadLaporanExcel(){
  if(!window.XLSX){ toast('Pustaka Excel belum termuat, coba lagi sesaat lagi.', 'err'); return; }
  try{
    const period = state.uiFlags.laporanPeriod;
    const {start} = periodRange(period);
    const periodLabel = {hari:'Hari Ini', minggu:'7 Hari Terakhir', bulan:'Bulan Ini', tahun:'Tahun Ini', semua:'Semua Waktu'}[period] || period;
    const rows = state.transaksi.filter(t=> new Date(t.tanggal) >= start);

    const bySantri = {};
    rows.forEach(t=>{ (bySantri[t.santriId] = bySantri[t.santriId]||[]).push(t); });

    const jenisNames = state.jenisPembayaran.map(j=>j.nama);
    const wb = XLSX.utils.book_new();

    /* ---- Sheet 1: Rekap Semua Santri ---- */
    const rekapHeader = ['NIS','Nama Santri','Kelas','Asrama','Status', ...jenisNames, 'Total Bayar','Jumlah Transaksi'];
    const rekapData = [
      [state.settings.namaLembaga||''],
      ['Laporan Keuangan — Rekap Pembayaran Santri ('+periodLabel+')'],
      ['Diunduh: '+formatTanggal(todayISO(), true)],
      [],
      rekapHeader,
    ];
    let grandTotal = 0, grandTrx = 0;
    state.santri.forEach(s=>{
      const trxSantri = bySantri[s.id] || [];
      const perJenis = {}; jenisNames.forEach(n=> perJenis[n]=0);
      let total = 0;
      trxSantri.forEach(t=> t.items.forEach(it=>{
        perJenis[it.nama] = (perJenis[it.nama]||0) + it.subtotal;
        total += it.subtotal;
      }));
      grandTotal += total; grandTrx += trxSantri.length;
      rekapData.push([s.nis, s.nama, s.kelas, s.asrama, s.status, ...jenisNames.map(n=>perJenis[n]), total, trxSantri.length]);
    });
    rekapData.push([]);
    rekapData.push(['','','','','', ...jenisNames.map(()=>''), grandTotal, grandTrx]);
    const wsRekap = XLSX.utils.aoa_to_sheet(rekapData);
    wsRekap['!cols'] = [{wch:10},{wch:24},{wch:8},{wch:12},{wch:9}, ...jenisNames.map(()=>({wch:16})), {wch:15},{wch:10}];
    XLSX.utils.book_append_sheet(wb, wsRekap, 'Rekap Semua Santri');

    /* ---- Sheet per santri: Leger Pembayaran ---- */
    const usedNames = new Set(['Rekap Semua Santri']);
    [...state.santri].sort((a,b)=> a.nama.localeCompare(b.nama)).forEach(s=>{
      const trxSantri = (bySantri[s.id]||[]).slice().sort((a,b)=> new Date(a.tanggal)-new Date(b.tanggal));
      const aoa = [];
      aoa.push([state.settings.namaLembaga||'']);
      aoa.push(['LEGER PEMBAYARAN SANTRI']);
      aoa.push(['Periode: '+periodLabel]);
      aoa.push([]);
      aoa.push(['Nama Santri', s.nama, '', 'NIS', s.nis]);
      aoa.push(['Kelas', s.kelas, '', 'Asrama', s.asrama]);
      aoa.push(['Wali', s.waliNama, '', 'No. HP Wali', s.waliHp]);
      aoa.push(['Status', s.status]);
      aoa.push([]);
      aoa.push(['No','Tanggal','No. Nota','Jenis Pembayaran','Qty','Nominal','Metode','Catatan']);
      let no = 1, runningTotal = 0;
      if(trxSantri.length){
        trxSantri.forEach(t=>{
          t.items.forEach(it=>{
            runningTotal += it.subtotal;
            aoa.push([no++, formatTanggal(t.tanggal, true), t.noNota, it.nama, it.qty, it.subtotal, t.metode, t.catatan||'']);
          });
        });
      } else {
        aoa.push(['-','-','Belum ada transaksi pembayaran pada periode ini.','','','','','']);
      }
      aoa.push([]);
      aoa.push(['','','','','','TOTAL PEMBAYARAN', runningTotal, '']);
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws['!cols'] = [{wch:4},{wch:18},{wch:14},{wch:22},{wch:6},{wch:14},{wch:10},{wch:22}];
      const sheetName = uniqueSheetName((s.nis?s.nis+' - ':'')+s.nama, usedNames);
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
    });

    XLSX.writeFile(wb, `Laporan_Keuangan_Leger_Santri_${period}_${Date.now()}.xlsx`);
    toast('Laporan keuangan Excel (leger per santri) berhasil diunduh.', 'ok');
  }catch(err){
    toast('Gagal membuat laporan Excel: '+err.message, 'err');
  }
}

function downloadCSV(){
  const period = state.uiFlags.laporanPeriod;
  const {start} = periodRange(period);
  const rows = state.transaksi.filter(t=> new Date(t.tanggal) >= start);
  let csv = 'DEBIT (PEMASUKAN DARI TRANSAKSI)\n';
  csv += 'No Nota,Tanggal,Santri,NIS,Item,Total,Metode\n';
  rows.forEach(t=>{
    const s = state.santri.find(x=>x.id===t.santriId);
    const items = t.items.map(i=>i.nama+' x'+i.qty).join(' | ');
    csv += `"${t.noNota}","${formatTanggal(t.tanggal,true)}","${s?s.nama:''}","${s?s.nis:''}","${items}","${t.total}","${t.metode}"\n`;
  });
  const totalDebit = rows.reduce((s,t)=>s+t.total,0);
  csv += `,,,,,"${totalDebit}",\n`;

  const pengeluaranRows = state.pengeluaran.filter(p=> new Date(p.tanggal) >= start);
  csv += '\nKREDIT (PENGELUARAN)\n';
  csv += 'Tanggal,Kategori,Keterangan,Nominal\n';
  pengeluaranRows.forEach(p=>{
    csv += `"${formatTanggal(p.tanggal)}","${p.kategori}","${p.keterangan||''}","${p.nominal}"\n`;
  });
  const totalKredit = pengeluaranRows.reduce((s,p)=>s+p.nominal,0);
  csv += `,,"Total Kredit","${totalKredit}"\n`;
  csv += `\nSALDO BERSIH (DEBIT - KREDIT),"${totalDebit-totalKredit}"\n`;

  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `laporan_pembayaran_santri_${Date.now()}.csv`;
  link.click();
  toast('Laporan CSV berhasil diunduh.', 'ok');
}

  } else if(m.type==='guru'){
    const nama = document.getElementById('fGNama').value.trim();

    const payload = {
      nama,

      gajiPokok: Number(document.getElementById('fGGaji').value)||0,
    };
    if(m.data && m.data.id){
      const idx = state.guru.findIndex(x=>x.id===m.data.id);
      state.guru[idx] = {...state.guru[idx], ...payload};
    } else {
      state.guru.push({id:uid(), ...payload});
    }
    dbSet('guru', state.guru);
    toast('Data guru disimpan.', 'ok');
  } else if(m.type==='jenis'){
    const nama = document.getElementById('fJpNama').value.trim();
    if(!nama){ toast('Nama pembayaran wajib diisi.', 'err'); return; }
    const payload = {
      nama,
      kategori: document.getElementById('fJpKategori').value,
      kategoriSantri: document.getElementById('fJpKategoriSantri').value,
      periode: document.getElementById('fJpPeriode').value,
      semester: document.getElementById('fJpSemester').value,
      nominal: Number(document.getElementById('fJpNominal').value)||0,
      keterangan: document.getElementById('fJpKet').value.trim(),
    };
    if(m.data && m.data.id){
      const idx = state.jenisPembayaran.findIndex(x=>x.id===m.data.id);
      state.jenisPembayaran[idx] = {...state.jenisPembayaran[idx], ...payload};
    } else {
      state.jenisPembayaran.push({id:uid(), ...payload});
    }
    dbSet('jenisPembayaran', state.jenisPembayaran);
    toast('Jenis pembayaran disimpan.', 'ok');
  } else if(m.type==='user'){
    const username = document.getElementById('fUUsername').value.trim();
    const nama = document.getElementById('fUNama').value.trim();
    if(!username || !nama){ toast('Nama dan username wajib diisi.', 'err'); return; }
    const dup = state.users.find(u=>u.username===username && (!m.data || u.id!==m.data.id));
    if(dup){ toast('Username sudah digunakan.', 'err'); return; }
    const pass = document.getElementById('fUPass').value;
    const payload = { nama, username, role: document.getElementById('fURole').value };
    if(m.data && m.data.id){
      const idx = state.users.findIndex(x=>x.id===m.data.id);

    } else {
      if(!pass){ toast('Kata sandi wajib diisi untuk pengguna baru.', 'err'); return; }
      state.users.push({id:uid(), ...payload, password: pass});
    }
    dbSet('users', state.users);
    toast('Pengguna disimpan.', 'ok');
  }
  closeModal();
}

// Membuat struk pembayaran dalam format PDF (lebar 80mm, gaya kwitansi kasir profesional).
function buildNotaPDF(trx){
  if(!window.jspdf || !window.jspdf.jsPDF){ throw new Error('Pustaka PDF belum termuat, coba lagi sesaat lagi.'); }
  const s = state.santri.find(x=>x.id===trx.santriId);
  const { jsPDF } = window.jspdf;
  const W = 80, M = 5, CX = W/2;
  const bulanLineCount = trx.items.filter(i=>Array.isArray(i.bulanTerpilih)&&i.bulanTerpilih.length).length;
  const lineCount = (trx.items.length*2) + bulanLineCount + (trx.catatan?1:0);
  const H = 92 + lineCount*4.2;
  const doc = new jsPDF({ unit:'mm', format:[W, H] });
  let y = 10;
  const center = (t,size,bold,italic)=>{ doc.setFont('helvetica', italic?'italic':(bold?'bold':'normal')); doc.setFontSize(size); doc.text(String(t), CX, y, {align:'center'}); y+=size/2.1+0.6; };
  const hr = (dashed)=>{ y+=1.2; doc.setDrawColor(dashed?170:20); doc.setLineWidth(dashed?0.12:0.25); if(dashed) doc.setLineDashPattern([0.8,0.8],0); else doc.setLineDashPattern([],0); doc.line(M,y,W-M,y); doc.setLineDashPattern([],0); y+=4; };
  const row = (l,r,bold)=>{
    doc.setFont('helvetica', bold?'bold':'normal'); doc.setFontSize(bold?9:8);
    doc.text(String(l), M, y);
    doc.text(String(r), W-M, y, {align:'right'});
    y+=4.4;
  };

  // --- Kop lembaga ---
  center(state.settings.namaLembaga||'-', 12, true); y+=0.5;
  if(state.settings.alamat) center(state.settings.alamat, 7, false);
  if(state.settings.telp) center(state.settings.telp, 7, false);
  hr();
  center('BUKTI PEMBAYARAN SANTRI', 7.5, true);
  y+=2;

  // --- Kotak nomor struk (menonjol) ---
  doc.setDrawColor(41,122,82); doc.setLineWidth(0.25); doc.setLineDashPattern([0.9,0.7],0);
  doc.roundedRect(M, y-4.2, W-2*M, 10, 1.3, 1.3);
  doc.setLineDashPattern([],0);
  doc.setFont('helvetica','bold'); doc.setFontSize(6);
  doc.text('NOMOR STRUK', CX, y-0.8, {align:'center'});
  doc.setFontSize(10);
  doc.text(trx.noNota, CX, y+3.8, {align:'center'});
  y += 9.5;

  row('Tanggal / Jam', formatTanggal(trx.tanggal, true));
  row('Nama Santri', s ? s.nama : '-');
  row('NIS / Kelas', (s ? s.nis : '-') + ' / ' + (s ? s.kelas : '-'));
  row('Kasir', trx.kasirNama || '-');
  hr(true);

  // --- Rincian item ---
  trx.items.forEach(i=>{
    row(i.nama, formatRupiah(i.subtotal));
    doc.setFont('helvetica','normal'); doc.setFontSize(6.6); doc.setTextColor(120);
    let detail = `${i.qty} x ${formatRupiah(i.nominal)}`;
    if(Array.isArray(i.bulanTerpilih) && i.bulanTerpilih.length) detail += `  \u2022  ${labelBulanTerpilih(i.bulanTerpilih)}`;
    doc.text(detail, M, y-2.4);
    doc.setTextColor(0);
    y+=2.6;
  });
  hr();
  row('TOTAL BAYAR', formatRupiah(trx.total), true);
  row('Metode', trx.metode);
  if(trx.catatan) row('Catatan', trx.catatan);
  hr(true);
  center('Terima kasih atas pembayarannya', 8, true);
  center('Barakallahu fiikum', 7, false, true);
  y+=1.5;
  center(`Struk dicetak otomatis \u00B7 ${(state.settings.appNamePrefix||'Santri')}${(state.settings.appNameAccent||'Pay')}`, 5.5, false);
  return doc;
}

/* =========================================================
   GOOGLE DRIVE SYNC
========================================================= */
let gdriveTokenClient = null;
let gdriveTokenClientId = null;
let gdriveAccessToken = null;
let gdriveTokenExpiry = 0;
let gdriveAutoBackupTimer = null;
const GDRIVE_FILE_NAME = 'santripay_backup.json';
const GDRIVE_AUTO_BACKUP_MS = 10*60*1000; // 10 menit

function gdriveInitTokenClient(clientId){
  if(!window.google || !window.google.accounts || !window.google.accounts.oauth2){
    toast('Google Identity Services belum siap dimuat. Coba lagi sesaat lagi.', 'err');
    return null;
  }
  return google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: 'https://www.googleapis.com/auth/drive.file',
    callback: ()=>{},
  });
}

function gdriveRequestToken(onSuccess){
  const clientId = (state.gdrive.clientId||'').trim();
  if(!clientId){ toast('Isi Google OAuth Client ID terlebih dahulu.', 'err'); return; }
  if(location.protocol === 'file:'){
    toast('Google OAuth tidak mengizinkan login dari file lokal. Hosting aplikasi ini terlebih dahulu.', 'err');
    return;
  }
  if(!gdriveTokenClient || gdriveTokenClientId !== clientId){
    gdriveTokenClient = gdriveInitTokenClient(clientId);
    gdriveTokenClientId = clientId;
  }
  if(!gdriveTokenClient) return;
  gdriveTokenClient.callback = (resp)=>{
    if(resp.error){ toast('Gagal menyambungkan Google Drive: '+resp.error, 'err'); return; }
    gdriveAccessToken = resp.access_token;
    gdriveTokenExpiry = Date.now() + ((resp.expires_in||3600)*1000) - 60000;
    onSuccess();
  };
  gdriveTokenClient.requestAccessToken({ prompt: gdriveAccessToken ? '' : 'consent' });
}

function gdriveEnsureToken(onSuccess){
  if(gdriveAccessToken && Date.now() < gdriveTokenExpiry){ onSuccess(); return; }
  gdriveRequestToken(onSuccess);
}

function gdriveStartAutoBackup(){
  if(gdriveAutoBackupTimer) clearInterval(gdriveAutoBackupTimer);
  gdriveAutoBackupTimer = setInterval(()=>{ gdriveAutoUpload(); }, GDRIVE_AUTO_BACKUP_MS);
}

function gdriveStopAutoBackup(){
  if(gdriveAutoBackupTimer){ clearInterval(gdriveAutoBackupTimer); gdriveAutoBackupTimer = null; }
}

// Cadangan otomatis diam-diam setiap 10 menit — hanya berjalan jika token akses
// masih berlaku di memori (tidak memaksa munculnya popup consent tanpa interaksi user).
function gdriveAutoUpload(){
  if(!state.gdrive || !state.gdrive.connected) return;
  if(!(gdriveAccessToken && Date.now() < gdriveTokenExpiry)) return;
  gdriveUpload(true);
}

async function gdriveFindBackupFile(){
  const q = encodeURIComponent(`name='${GDRIVE_FILE_NAME}' and trashed=false`);
  const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,modifiedTime)&spaces=drive`, {
    headers: { Authorization: 'Bearer '+gdriveAccessToken }
  });
  if(!res.ok) throw new Error('HTTP '+res.status);
  const data = await res.json();
  return (data.files && data.files.length) ? data.files[0] : null;
}

async function gdriveCheckExistingAfterConnect(){
  try{
    const f = await gdriveFindBackupFile();
    if(f){
      state.gdrive.fileId = f.id;
      dbSet('gdrive', state.gdrive);
      if(confirm('Ditemukan cadangan data di Google Drive (terakhir diubah '+formatTanggal(f.modifiedTime,true)+'). Ambil data ini sekarang? Data lokal saat ini akan ditimpa.\n\nKlik Batal jika ingin menyimpan data lokal saat ini ke Drive.')){
        await gdriveDownloadAndRestore();
        return;
      }
    }
  }catch(err){ toast('Gagal memeriksa cadangan di Drive: '+err.message, 'err'); }
  render();
}

function gdriveConnect(clientIdOverride){
  const input = document.getElementById('gdriveClientId');
  const override = (typeof clientIdOverride === 'string') ? clientIdOverride.trim() : '';
  const clientId = (override ? override : (input ? input.value.trim() : ''));
  if(!clientId){ toast('Isi Google OAuth Client ID terlebih dahulu.', 'err'); return; }
  state.gdrive.clientId = clientId;
  dbSet('gdrive', state.gdrive);
  gdriveRequestToken(async ()=>{
    state.gdrive.connected = true;
    dbSet('gdrive', state.gdrive);
    localStorage.setItem(LS_PREFIX+'deviceSeen', '1');
    state.uiFlags.deviceModalOpen = false;
    toast('Berhasil tersambung ke Google Drive.', 'ok');
    gdriveStartAutoBackup();
    await gdriveCheckExistingAfterConnect();
  });
}

function gdriveDisconnect(){
  if(!confirm('Putuskan sambungan Google Drive? Cadangan otomatis akan dihentikan, namun file backup yang sudah ada di Drive tidak akan dihapus.')) return;
  gdriveStopAutoBackup();
  gdriveAccessToken = null;
  gdriveTokenExpiry = 0;
  gdriveTokenClient = null;
  gdriveTokenClientId = null;
  state.gdrive.connected = false;
  dbSet('gdrive', state.gdrive);
  toast('Sambungan Google Drive diputuskan.', 'ok');
  render();
}

function gdriveUpload(silent){
  gdriveEnsureToken(async ()=>{
    try{
      const backup = {
        users: state.users, santri: state.santri, guru: state.guru, jenisPembayaran: state.jenisPembayaran,
        transaksi: state.transaksi, pengeluaran: state.pengeluaran, settings: state.settings, exportedAt: todayISO(),
      };
      const content = JSON.stringify(backup, null, 2);
      let fileId = state.gdrive.fileId;
      if(!fileId){
        const existing = await gdriveFindBackupFile();
        if(existing) fileId = existing.id;
      }
      const boundary = 'santripay-'+Date.now();
      const metaPart = fileId ? '{}' : JSON.stringify({ name: GDRIVE_FILE_NAME, mimeType: 'application/json' });
      const body =
        `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${metaPart}\r\n`+
        `--${boundary}\r\nContent-Type: application/json\r\n\r\n${content}\r\n--${boundary}--`;
      const url = fileId
        ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`
        : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
      const res = await fetch(url, {
        method: fileId ? 'PATCH' : 'POST',
        headers: { Authorization: 'Bearer '+gdriveAccessToken, 'Content-Type': `multipart/related; boundary=${boundary}` },
        body
      });
      if(!res.ok) throw new Error('HTTP '+res.status);
      const data = await res.json();
      state.gdrive.fileId = data.id;
      state.gdrive.lastUploadAt = new Date().toISOString();
      state.gdrive.lastUploadOk = true;
      dbSet('gdrive', state.gdrive);
      if(!silent) toast('Data berhasil disimpan ke Google Drive.', 'ok');
      if(!silent || state.route==='pengaturan' || state.route==='dashboard') render();
    }catch(err){
      state.gdrive.lastUploadAt = new Date().toISOString();
      state.gdrive.lastUploadOk = false;
      dbSet('gdrive', state.gdrive);
      if(!silent) toast('Gagal menyimpan ke Google Drive: '+err.message, 'err');
      if(!silent && (state.route==='pengaturan' || state.route==='dashboard')) render();
    }
  });
}

async function gdriveDownloadAndRestore(){
  try{
    let fileId = state.gdrive.fileId;
    if(!fileId){ const f = await gdriveFindBackupFile(); if(f) fileId = f.id; }
    if(!fileId){ toast('Belum ada cadangan data di Google Drive.', 'err'); return; }
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
      headers: { Authorization: 'Bearer '+gdriveAccessToken }
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    if(data.users){ state.users = data.users; dbSet('users', state.users); }
    if(data.santri){ state.santri = data.santri; dbSet('santri', state.santri); }
    if(data.guru){ state.guru = data.guru; dbSet('guru', state.guru); }
    if(data.jenisPembayaran){ state.jenisPembayaran = data.jenisPembayaran; dbSet('jenisPembayaran', state.jenisPembayaran); }
    if(data.transaksi){ state.transaksi = data.transaksi; dbSet('transaksi', state.transaksi); }
    if(data.pengeluaran){ state.pengeluaran = data.pengeluaran; dbSet('pengeluaran', state.pengeluaran); }
    if(data.settings){ state.settings = data.settings; dbSet('settings', state.settings); applyTema(state.settings.tema); }
    state.gdrive.fileId = fileId;
    state.gdrive.lastDownloadAt = new Date().toISOString();
    state.gdrive.lastDownloadOk = true;
    dbSet('gdrive', state.gdrive);
    toast('Data berhasil dipulihkan dari Google Drive.', 'ok');
    render();
  }catch(err){
    state.gdrive.lastDownloadAt = new Date().toISOString();
    state.gdrive.lastDownloadOk = false;
    dbSet('gdrive', state.gdrive);
    toast('Gagal memulihkan dari Google Drive: '+err.message, 'err');
    render();
  }
}

function gdriveSyncBtnHTML(id, label){
  return `<button class="btn btn-gold btn-sm" id="${id}" ${!state.gdrive.connected?'disabled title="Sambungkan Google Drive di menu Pengaturan terlebih dahulu"':''}>&#128190; ${label||'Simpan &amp; Sinkron ke Drive'}</button>`;

function gdriveUpdateFromDashboard(){
  if(!state.gdrive.clientId){
    const msg = state.auth.role==='admin'
      ? 'Hubungkan Google Drive terlebih dahulu di menu Pengaturan.'
      : 'Google Drive belum tersambung. Hubungi Admin untuk menyambungkannya di menu Pengaturan.';
    toast(msg, 'err'); return;
  }
  if(!confirm('Ambil data terbaru dari Google Drive? Data lokal saat ini akan ditimpa.')) return;
  gdriveEnsureToken(()=> gdriveDownloadAndRestore());
}

   BACKUP / RESTORE
========================================================= */
function downloadBackup(){
  const backup = {
    users: state.users, santri: state.santri, guru: state.guru, jenisPembayaran: state.jenisPembayaran,
    transaksi: state.transaksi, pengeluaran: state.pengeluaran, settings: state.settings, exportedAt: todayISO(),
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `backup_santripay_${Date.now()}.json`;
  link.click();
  toast('Cadangan data berhasil diunduh.', 'ok');
}

function restoreFromFile(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = JSON.parse(e.target.result);
      if(!confirm('Memulihkan data akan menimpa data saat ini di perangkat ini. Lanjutkan?')) return;
      if(data.users) { state.users = data.users; dbSet('users', state.users); }
      if(data.santri) { state.santri = data.santri; dbSet('santri', state.santri); }
      if(data.guru) { state.guru = data.guru; dbSet('guru', state.guru); }
      if(data.jenisPembayaran) { state.jenisPembayaran = data.jenisPembayaran; dbSet('jenisPembayaran', state.jenisPembayaran); }
      if(data.transaksi) { state.transaksi = data.transaksi; dbSet('transaksi', state.transaksi); }
      if(data.pengeluaran) { state.pengeluaran = data.pengeluaran; dbSet('pengeluaran', state.pengeluaran); }
      if(data.settings) { state.settings = data.settings; dbSet('settings', state.settings); applyTema(state.settings.tema); }
      toast('Data berhasil dipulihkan.', 'ok');
      render();
    }catch(err){ toast('File cadangan tidak valid: '+err.message, 'err'); }
  };
  reader.readAsText(file);
}

      state.uiFlags.pengeluaranForm.nominal = document.getElementById('peNominal')?.value || state.uiFlags.pengeluaranForm.nominal;
      if(state.uiFlags.pengeluaranForm.kategori!=='Gaji Guru') state.uiFlags.pengeluaranForm.guruId = '';
      render();
    });
    document.getElementById('peGuru')?.addEventListener('change', e=>{
      const pf = state.uiFlags.pengeluaranForm;
      pf.guruId = e.target.value;
      const g = state.guru.find(x=>x.id===pf.guruId);
      if(g){
        pf.nominal = g.gajiPokok || pf.nominal;
        const bulanNama = new Date(pf.tanggal || localDateStr()).toLocaleDateString('id-ID', {month:'long', year:'numeric'});
        pf.keterangan = `Gaji ${g.nama} - ${bulanNama}`;
      }
      render();
    });
    document.getElementById('btnTambahPengeluaran')?.addEventListener('click', ()=>{
      const pf = state.uiFlags.pengeluaranForm;
      const kategoriLainEl = document.getElementById('peKategoriLain');
      const kategori = pf.kategori==='Lainnya' ? (kategoriLainEl?.value||'').trim() : pf.kategori;
      const tanggal = document.getElementById('peTanggal')?.value || localDateStr();
      const keterangan = (document.getElementById('peKeterangan')?.value||'').trim();
      const nominal = Number(document.getElementById('peNominal')?.value||0);
      const guruId = (kategori==='Gaji Guru') ? (document.getElementById('peGuru')?.value||'') : '';
      if(!kategori){ toast('Isi nama kategori pengeluaran terlebih dahulu.', 'err'); return; }
      if(!nominal || nominal<=0){ toast('Nominal pengeluaran harus lebih dari 0.', 'err'); return; }
      if(kategori==='Gaji Guru' && !guruId){ toast('Pilih nama guru terlebih dahulu.', 'err'); return; }
      state.pengeluaran.push({ id:uid(), tanggal, kategori, keterangan, nominal, guruId, dicatatOleh: state.auth?.nama || '' });
      dbSet('pengeluaran', state.pengeluaran);
      state.uiFlags.pengeluaranForm = { kategori:'Gaji Guru', kategoriLain:'', guruId:'', tanggal:'', keterangan:'', nominal:'' };
      toast('Pengeluaran berhasil dicatat.', 'ok');
      render();
    });
    document.querySelectorAll('[data-wa-pengeluaran]').forEach(b=>b.addEventListener('click', ()=>{
      kirimNotaGajiWA(b.dataset.waPengeluaran);
    }));
    document.querySelectorAll('[data-del-pengeluaran]').forEach(b=>b.addEventListener('click', ()=>{
      if(confirm('Hapus catatan pengeluaran ini? Tindakan tidak dapat dibatalkan.')){
        state.pengeluaran = state.pengeluaran.filter(p=>p.id!==b.dataset.delPengeluaran);
        dbSet('pengeluaran', state.pengeluaran); toast('Pengeluaran dihapus.', 'ok'); render();
      }
    }));
  }

  if(state.route==='pengguna'){
    document.getElementById('btnAddUser')?.addEventListener('click', ()=>openModal('user', null));
    document.getElementById('btnSyncUser')?.addEventListener('click', ()=>gdriveUpload(false));
    document.querySelectorAll('[data-edit-user]').forEach(b=>b.addEventListener('click', ()=>{
      openModal('user', state.users.find(u=>u.id===b.dataset.editUser));
    }));
    document.querySelectorAll('[data-del-user]').forEach(b=>b.addEventListener('click', ()=>{
      if(confirm('Hapus pengguna ini?')){
        state.users = state.users.filter(u=>u.id!==b.dataset.delUser);
        dbSet('users', state.users); toast('Pengguna dihapus.', 'ok'); render();
      }
    }));
  }

  if(state.route==='pengaturan'){
    document.getElementById('btnGdriveConnect')?.addEventListener('click', ()=>gdriveConnect());
    document.getElementById('btnUploadLogo')?.addEventListener('click', ()=>document.getElementById('fileLogoInput')?.click());
    document.getElementById('fileLogoInput')?.addEventListener('change', e=>{
      const file = e.target.files && e.target.files[0];
      if(!file) return;
      if(!file.type.startsWith('image/')){ toast('File harus berupa gambar.', 'err'); e.target.value=''; return; }
      if(file.size > 1024*1024){ toast('Ukuran logo maksimal 1 MB.', 'err'); e.target.value=''; return; }
      const reader = new FileReader();
      reader.onload = ev=>{
        state.settings.logoDataUrl = ev.target.result;
        dbSet('settings', state.settings);
        toast('Logo berhasil disimpan.', 'ok');
        render();
      };
      reader.onerror = ()=> toast('Gagal membaca file logo.', 'err');
      reader.readAsDataURL(file);
      e.target.value = '';
    });
    document.getElementById('btnHapusLogo')?.addEventListener('click', ()=>{
      if(!confirm('Hapus logo aplikasi? Tampilan akan kembali memakai teks nama aplikasi.')) return;
      state.settings.logoDataUrl = '';
      dbSet('settings', state.settings);
      toast('Logo dihapus.', 'ok');
      render();
    });
    document.getElementById('btnSaveBranding')?.addEventListener('click', ()=>{
      state.settings.appNamePrefix = document.getElementById('stAppPrefix').value.trim() || 'Santri';
      state.settings.appNameAccent = document.getElementById('stAppAccent').value.trim() || 'Pay';
      state.settings.appTagline = document.getElementById('stTagline').value.trim();
      dbSet('settings', state.settings);
      toast('Tampilan aplikasi disimpan.', 'ok');
      render();
    });
    document.getElementById('btnGdriveUpload')?.addEventListener('click', ()=>gdriveUpload(false));
    document.getElementById('btnGdriveDisconnect')?.addEventListener('click', gdriveDisconnect);
    document.getElementById('btnGdriveDownload')?.addEventListener('click', ()=>{
      if(!confirm('Mengambil data dari Google Drive akan menimpa data lokal saat ini di perangkat ini. Lanjutkan?')) return;
      gdriveEnsureToken(()=> gdriveDownloadAndRestore());
    });
    document.getElementById('btnSaveProfil')?.addEventListener('click', ()=>{
      state.settings.namaLembaga = document.getElementById('stNamaLembaga').value.trim();
      state.settings.alamat = document.getElementById('stAlamat').value.trim();
      state.settings.telp = document.getElementById('stTelp').value.trim();
      dbSet('settings', state.settings);
      toast('Profil lembaga disimpan.', 'ok'); render();
    });
    document.querySelectorAll('[data-tema]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        state.settings.tema = btn.dataset.tema;
        dbSet('settings', state.settings);
        applyTema(state.settings.tema);
        toast('Tema berhasil diganti.', 'ok');
        render();
      });
    });
    document.getElementById('btnBackupData')?.addEventListener('click', downloadBackup);
    document.getElementById('btnRestoreData')?.addEventListener('click', ()=>document.getElementById('fileRestoreInput')?.click());
    document.getElementById('fileRestoreInput')?.addEventListener('change', e=>{
      const file = e.target.files && e.target.files[0];
      if(file) restoreFromFile(file);
      e.target.value = '';
    });
    document.getElementById('btnCheckLocalStorage')?.addEventListener('click', ()=>{
      const statusEl = document.getElementById('localStorageStatus');
      if(!statusEl) return;
      statusEl.style.display = 'block';
      try{
        const keys = ['users','santri','guru','jenisPembayaran','transaksi','pengeluaran','settings'];
        let html = '<strong>Status penyimpanan lokal:</strong><br>';
        let totalSize = 0;
        keys.forEach(k=>{
          const v = localStorage.getItem(LS_PREFIX+k);
          const size = v ? Math.round(v.length/1024) : 0;
          totalSize += size;
          html += `\u2022 <code>${k}</code>: ${v ? `\u2705 Ada (\u00B1${size} KB)` : '\u274C Tidak ada'}<br>`;
        });
        html += `<br>Total ukuran: \u00B1${totalSize} KB dari batas ~5 MB`;
        statusEl.innerHTML = html;
      }catch(e){ statusEl.textContent = 'Tidak dapat membaca penyimpanan lokal: '+e.message; }
    });
    document.getElementById('btnClearLocalStorage')?.addEventListener('click', ()=>{
      if(!confirm('Ini akan menghapus semua data pada perangkat ini. Lanjutkan?')) return;
      ['users','santri','guru','jenisPembayaran','transaksi','pengeluaran','settings'].forEach(k=> localStorage.removeItem(LS_PREFIX+k));
      toast('Data lokal berhasil dihapus. Memuat ulang...', 'ok');
      setTimeout(()=>location.reload(), 800);
    });
  }
}

boot();
</script>
</body>
</html>
